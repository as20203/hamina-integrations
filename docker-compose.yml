# Profile `hamina-build`: production images — db + redis + prisma-migrate + backend (apps/backend/Dockerfile) + frontend (apps/frontend/Dockerfile)
#   docker compose --profile hamina-build up --build
#
# Profile `e2e`: one-shot Playwright tests in Docker (`npm run docker:test:e2e`). Requires `hamina` so db/redis/migrate/backend/frontend are available.
services:
  redis:
    profiles: ["redis", "hamina", "backend", "backend-build", "hamina-build"]
    image: redis:8.4-alpine
    container_name: hamina-redis
    hostname: hamina-redis
    # BullMQ requires noeviction: LRU can drop jobs/cache keys and triggers console warnings in bullmq.
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    profiles:
      [
        "db",
        "hamina",
        "prisma-migrate",
        "backend",
        "frontend",
        "backend-build",
        "frontend-build",
        "hamina-build",
      ]
    container_name: hamina-shared-db
    build:
      context: ./packages/database/prisma
      dockerfile: Dockerfile
    ports:
      - "3762:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prisma-migrate:
    profiles: ["prisma-migrate", "hamina", "hamina-build"]
    container_name: hamina-prisma-migrate
    build:
      context: .
      dockerfile: ./packages/database/Dockerfile.web
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/postgres}
      - DIRECT_DATABASE_URL=${DIRECT_DATABASE_URL:-postgresql://postgres:postgres@db:5432/postgres}
      - APP_SOURCE_NAME=${APP_SOURCE_NAME:-unknown}
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && sh ./scripts/wait-db.sh && npm run db:migrate --workspace @repo/db && npm run db:generate --workspace @repo/db"

  backend:
    profiles: ["backend", "hamina"]
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    container_name: hamina-backend
    env_file:
      - ./apps/frontend/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/postgres}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL:-postgresql://postgres:postgres@db:5432/postgres}
      PORT: 4000
      # Same pattern as BACKEND_INTERNAL_URL on frontend: service DNS name on the Compose network
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app/apps/backend
      - ./packages:/app/packages
      - ./scripts:/app/scripts
      - ./package-lock.json:/app/package-lock.json
      - ./package.json:/app/package.json
      - ./turbo.json:/app/turbo.json
      - /app/node_modules

  frontend:
    profiles: ["frontend", "hamina"]
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.dev
    container_name: hamina-frontend
    working_dir: /app/apps/frontend
    command: npm run dev
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    env_file:
      - ./apps/frontend/.env
    environment:
      NODE_ENV: development
      # Server-side BFF → Express (service name resolves on the Compose network)
      BACKEND_INTERNAL_URL: http://backend:4000
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - ./packages:/app/packages
      - ./scripts:/app/scripts
      - ./package-lock.json:/app/package-lock.json
      - ./package.json:/app/package.json
      - ./turbo.json:/app/turbo.json
      - /app/node_modules

  backend-build:
    profiles: ["backend-build", "hamina-build"]
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: hamina-backend-build
    env_file:
      - ./apps/frontend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/postgres}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL:-postgresql://postgres:postgres@db:5432/postgres}
      PORT: 4000
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      prisma-migrate:
        condition: service_completed_successfully

  frontend-build:
    profiles: ["frontend-build", "hamina-build"]
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: hamina-frontend-build
    ports:
      - "3100:3000"
    depends_on:
      backend-build:
        condition: service_started
    environment:
      NODE_ENV: production
      BACKEND_INTERNAL_URL: http://backend-build:4000

  e2e:
    profiles: ["e2e"]
    build:
      context: .
      dockerfile: e2e/Dockerfile
    container_name: hamina-e2e
    environment:
      PLAYWRIGHT_BASE_URL: http://frontend:3000
      CI: "true"
      PLAYWRIGHT_E2E_SITE_ID: ${PLAYWRIGHT_E2E_SITE_ID:-}
    depends_on:
      prisma-migrate:
        condition: service_completed_successfully
      frontend:
        condition: service_started
    volumes:
      - ./e2e:/app/e2e
      - ./playwright-report:/app/playwright-report
      - ./test-results:/app/test-results

volumes:
  postgres_data:
  redis_data:
